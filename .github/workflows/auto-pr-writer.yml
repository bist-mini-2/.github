name: Auto PR Description Writer (Gemini)

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  write-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout .github repository (for shared scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/.github
          path: .github-shared

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch PR diff
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
               -H "Accept: application/vnd.github.v3.diff" \
               "${{ github.event.pull_request.url }}" > pr.diff

      - name: Generate and Update PR Description
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python .github-shared/.github/scripts/generate_pr_description.py
